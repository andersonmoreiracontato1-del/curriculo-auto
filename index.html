<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Envio de Currículo</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 15px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
    .upload-area { border: 3px dashed #667eea; padding: 30px; border-radius: 10px; cursor: pointer; background: #f8f9ff; margin: 20px 0; transition: 0.3s; }
    .upload-area:hover { background: #eff2ff; }
    #preview { width: 100%; display: none; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    button { width: 100%; padding: 18px; background: #764ba2; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
    button:hover { background: #5a3682; transform: translateY(-2px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .loader { display: none; margin: 20px 0; color: #667eea; font-weight: bold; animation: pulse 1.5s infinite; }
    .res { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; text-align: left; border: 1px solid; }
    .ok { background: #d4edda; color: #155724; border-color: #c3e6cb; }
    .err { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 Envio Automático</h1>
    <p style="color: #666;">Selecione a foto da vaga para enviar seu currículo.</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:50px">📄</div>
      <p>Clique aqui para carregar a imagem</p>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <img id="preview">
    
    <button id="sendBtn" disabled>Extrair e Enviar Agora</button>
    
    <div id="loader" class="loader">🤖 IA analisando e enviando e-mail...</div>
    <div id="result" class="res"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzhgNqPF89XxYbgCtHBnKRMb8Hgq7fYtVYUy4RwA4XB33mT6wirEg6KacbYBLWdhsh-w/exec';

    let base64Data = null;

    document.getElementById('fileInput').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_SIZE = 500;
          let w = img.width, h = img.height;
          if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE/w; w = MAX_SIZE; } } 
          else { if (h > MAX_SIZE) { w *= MAX_SIZE/h; h = MAX_SIZE; } }
          
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          
          base64Data = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
          const previewImg = document.getElementById('preview');
          previewImg.src = canvas.toDataURL('image/jpeg');
          previewImg.style.display = 'block';
          document.getElementById('sendBtn').disabled = false;
          document.getElementById('result').style.display = 'none';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };

    document.getElementById('sendBtn').onclick = async () => {
      const btn = document.getElementById('sendBtn');
      const resDiv = document.getElementById('result');
      const loader = document.getElementById('loader');

      btn.disabled = true;
      loader.style.display = 'block';
      resDiv.style.display = 'none';

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ imagem: base64Data })
        });
        
        const data = await response.json();
        resDiv.style.display = 'block';
        
        if (data.sucesso) {
          resDiv.className = 'res ok';
          resDiv.innerHTML = `✅ <b>Currículo Enviado!</b><br><b>Cargo:</b> ${data.vaga}<br><b>Para:</b> ${data.email}`;
        } else {
          resDiv.className = 'res err';
          resDiv.innerText = '❌ Erro: ' + data.erro;
        }
      } catch (err) {
        resDiv.className = 'res err';
        resDiv.innerText = '❌ Falha na conexão ou permissão.';
      } finally {
        loader.style.display = 'none';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
