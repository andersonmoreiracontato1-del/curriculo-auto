<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envio em Lote - Anderson</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; border: 1px solid #333; text-align: center; }
        h2 { color: #bb86fc; margin-bottom: 10px; }
        .btn-upload { background: #03dac6; color: #000; padding: 20px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; width: 100%; margin-bottom: 20px; }
        .status-container { text-align: left; max-height: 300px; overflow-y: auto; margin-top: 20px; }
        .log-item { padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }
        .success { color: #03dac6; }
        .error { color: #cf6679; }
        .loading-bar { height: 4px; background: #bb86fc; width: 0%; transition: 0.3s; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Envio em Lote (Máx 30)</h2>
    <p>Conta: andersonmoreiracontato1@gmail.com</p>
    
    <div id="bar" class="loading-bar"></div>
    
    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📁 SELECIONAR PRINTS</button>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>

    <div id="statusBox" class="status-container"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyL1eazlTMxOxyO0wkAEAsDTmEd0dftXnz0iNONUvMBPwX-60ElXFcxwxccHC6669vR/exec";

    const fileInput = document.getElementById('fileInput');
    const statusBox = document.getElementById('statusBox');
    const bar = document.getElementById('bar');

    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files).slice(0, 30);
        if (files.length === 0) return;

        statusBox.innerHTML = "<b>Iniciando processamento...</b><br>";
        let processados = 0;

        for (let file of files) {
            const logId = "log-" + Math.random().toString(16).slice(2);
            adicionarLog(logId, `Lendo: ${file.name}...`);

            try {
                const base64 = await comprimirImagem(file);
                atualizarLog(logId, `Enviando: ${file.name}...`);
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ imagem: base64 })
                });
                const result = await response.json();

                if (result.sucesso) {
                    atualizarLog(logId, `✅ [${result.metodo}] ${result.vaga} → ${result.email}`, "success");
                } else {
                    atualizarLog(logId, `❌ [${result.metodo || "?"}] ${result.erro}`, "error");
                }
            } catch (err) {
                atualizarLog(logId, `❌ Erro de conexão`, "error");
            }

            processados++;
            bar.style.width = (processados / files.length * 100) + "%";
        }

        adicionarLog("", "<b>Processo Finalizado!</b>");
        fileInput.value = "";
    };

    function comprimirImagem(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 1000;
                let w = img.width, h = img.height;
                if (w > MAX) { h = h * MAX / w; w = MAX; }
                if (h > MAX) { w = w * MAX / h; h = MAX; }
                canvas.width = w;
                canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                URL.revokeObjectURL(url);
                resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
            };
            img.onerror = reject;
            img.src = url;
        });
    }

    function adicionarLog(id, texto) {
        const div = document.createElement('div');
        div.id = id;
        div.className = 'log-item';
        div.innerHTML = texto;
        statusBox.prepend(div);
    }

    function atualizarLog(id, texto, classe) {
        const el = document.getElementById(id);
        if (el) {
            el.innerHTML = texto;
            if (classe) el.classList.add(classe);
        }
    }
</script>

</body>
</html>
