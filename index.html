<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envio Automático Anderson</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
    .card { background: #1e1e1e; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
    h2 { color: #bb86fc; margin-bottom: 5px; }
    p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
    .btn-camera { background: #6200ee; color: white; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; width: 100%; transition: 0.3s; }
    .btn-camera:active { transform: scale(0.98); background: #3700b3; }
    #preview { width: 100%; border-radius: 10px; display: none; margin-top: 20px; border: 2px solid #333; }
    .status { margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 10px; display: none; font-size: 14px; line-height: 1.5; }
    .loading { background: #333; color: #bb86fc; border: 1px solid #bb86fc; animation: pulse 1.5s infinite; }
    .success { background: #03dac6; color: #000; }
    .error { background: #cf6679; color: white; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
  </style>
</head>
<body>

<div class="card">
  <h2>🚀 Auto-Envio</h2>
  <p>Tire a foto da vaga e o sistema faz o resto.</p>

  <button class="btn-camera" onclick="document.getElementById('fileInput').click()">📸 ABRIR CÂMERA</button>
  <input type="file" id="fileInput" accept="image/*" capture="camera" hidden>

  <img id="preview">
  
  <div id="statusBox" class="status"></div>
</div>

<script>
  // Link atualizado da sua última implantação
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylx0puPP6Y9qcsNJKf1TY70_A-K-N_55XGFOVENyz_gasbuS8F-xDcOK5N_yDq2FTlBA/exec";

  const fileInput = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const statusBox = document.getElementById('statusBox');

  fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Mostrar foto e avisar que começou
    const reader = new FileReader();
    reader.onload = (ev) => {
      preview.src = ev.target.result;
      preview.style.display = "block";
      showStatus("⏳ IA Analisando e Enviando Currículo...", "loading");
    };
    reader.readAsDataURL(file);

    // Preparar imagem (Redimensionar para ser rápido e não gastar cota à toa)
    const img = new Image();
    img.src = URL.createObjectURL(file);
    img.onload = async () => {
      const canvas = document.createElement('canvas');
      const MAX_WIDTH = 800; 
      const scaleSize = MAX_WIDTH / img.width;
      canvas.width = MAX_WIDTH;
      canvas.height = img.height * scaleSize;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      
      const base64Data = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

      // DISPARO AUTOMÁTICO PARA O GOOGLE APPS SCRIPT
      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ imagem: base64Data })
        });
        const result = await response.json();

        if (result.sucesso) {
          showStatus(`✅ ENVIADO COM SUCESSO!<br><b>Para:</b> ${result.email}<br><b>Vaga:</b> ${result.vaga || 'Não identificada'}`, "success");
        } else {
          showStatus("❌ FALHA: " + (result.erro || "IA não encontrou e-mail."), "error");
        }
      } catch (err) {
        showStatus("❌ ERRO DE CONEXÃO: Verifique sua internet.", "error");
      }
    };
  };

  function showStatus(text, type) {
    statusBox.innerHTML = text;
    statusBox.className = "status " + type;
    statusBox.style.display = "block";
  }
</script>

</body>
</html>
