<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envio Direto - Moreira</title>
  <style>
    body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #111; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; border: 1px solid #333; text-align: center; }
    h2 { color: #bb86fc; margin: 0 0 20px 0; }
    .btn { background: #03dac6; color: #000; padding: 18px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; width: 100%; }
    #preview { width: 100%; border-radius: 8px; display: none; margin-top: 15px; border: 1px solid #444; }
    .status { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; font-size: 14px; font-weight: bold; }
    .loading { background: #222; color: #bb86fc; }
    .success { background: #1b5e20; color: #fff; }
    .error { background: #b71c1c; color: #fff; }
  </style>
</head>
<body>

<div class="card">
  <h2>🚀 Moreira Envios</h2>
  <button class="btn" onclick="document.getElementById('fileInput').click()">📁 SELECIONAR PRINT / FOTO</button>
  <input type="file" id="fileInput" accept="image/*" hidden>
  <img id="preview">
  <div id="statusBox" class="status"></div>
</div>

<script>
  // SEU LINK NOVO
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyai1my5Ep_kWuLYlwH6dDdXFuGVEsItbSp0wYIVQapsPTitt1pPlT033p4kp2nbImjKg/exec";

  const fileInput = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const statusBox = document.getElementById('statusBox');

  fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (ev) => {
      preview.src = ev.target.result;
      preview.style.display = "block";
      showStatus("⏳ Enviando...", "loading");
    };
    reader.readAsDataURL(file);

    const img = new Image();
    img.src = URL.createObjectURL(file);
    img.onload = async () => {
      const canvas = document.createElement('canvas');
      const MAX_WIDTH = 850; 
      canvas.width = MAX_WIDTH;
      canvas.height = img.height * (MAX_WIDTH / img.width);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

      try {
        const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ imagem: base64 }) });
        const out = await res.json();
        if (out.sucesso) {
          showStatus(`✅ ENVIADO!<br>Email: ${out.email}<br>Metodo: ${out.metodo}`, "success");
        } else {
          showStatus("❌ ERRO: " + out.erro, "error");
        }
      } catch (err) {
        showStatus("❌ ERRO DE CONEXÃO", "error");
      }
    };
  };

  function showStatus(txt, cls) {
    statusBox.innerHTML = txt;
    statusBox.className = "status " + cls;
    statusBox.style.display = "block";
  }
</script>

</body>
</html>
