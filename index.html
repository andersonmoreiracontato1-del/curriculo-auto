<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envio em Lote - Anderson Moreira</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #bb86fc; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        .btn-upload { background: #03dac6; color: #000; padding: 20px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; width: 100%; margin-bottom: 20px; transition: 0.3s; }
        .btn-upload:active { transform: scale(0.98); }
        .status-container { text-align: left; max-height: 300px; overflow-y: auto; margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        .log-item { padding: 12px; border-bottom: 1px solid #222; font-size: 13px; border-radius: 8px; margin-bottom: 5px; background: #1a1a1a; }
        .success { color: #03dac6; border-left: 4px solid #03dac6; }
        .error { color: #cf6679; border-left: 4px solid #cf6679; }
        .loading-bar { height: 4px; background: #bb86fc; width: 0%; transition: 0.3s; margin-bottom: 15px; border-radius: 2px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Auto-Envio Profissional</h2>
    <p>Conectado: andersonmoreiracontato1@gmail.com</p>
    
    <div id="bar" class="loading-bar"></div>
    
    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📁 SELECIONAR ATÉ 10 PRINTS</button>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>

    <div id="statusBox" class="status-container"></div>
</div>

<script>
    // NOVO LINK DO SCRIPT COM SUPORTE A PLANILHA
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGcBImF1XcB5uv9W-75E66zrQs2gW-lQEfIIk3-0a3LPMEW2tfugXkwBksTezK3uTz/exec";
    
    const fileInput = document.getElementById('fileInput');
    const statusBox = document.getElementById('statusBox');
    const bar = document.getElementById('bar');

    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files).slice(0, 10);
        if (files.length === 0) return;

        statusBox.innerHTML = "";
        bar.style.width = "0%";
        let processados = 0;

        for (let file of files) {
            const logId = "log-" + Math.random().toString(16).slice(2);
            adicionarLog(logId, `⏳ Lendo: ${file.name}...`);

            try {
                const base64 = await toBase64(file);
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ imagem: base64 })
                });
                const result = await response.json();

                if (result.sucesso) {
                    atualizarLog(logId, `✅ <b>Enviado:</b> ${result.email}<br><small>Gravado na planilha via ${result.metodo}</small>`, "success");
                } else {
                    atualizarLog(logId, `❌ <b>Falha:</b> ${result.erro}`, "error");
                }
            } catch (err) {
                atualizarLog(logId, `❌ <b>Erro:</b> Falha na conexão com o servidor.`, "error");
            }

            processados++;
            bar.style.width = (processados / files.length * 100) + "%";
        }
    };

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });
    }

    function adicionarLog(id, texto) {
        const div = document.createElement('div');
        div.id = id;
        div.className = 'log-item';
        div.innerHTML = texto;
        statusBox.prepend(div);
    }

    function atualizarLog(id, texto, classe) {
        const el = document.getElementById(id);
        if (el) {
            el.innerHTML = texto;
            el.className = 'log-item ' + classe;
        }
    }
</script>

</body>
</html>
