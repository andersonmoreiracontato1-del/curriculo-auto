<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar Currículo Automático</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); padding: 40px; max-width: 500px; width: 100%; text-align: center; }
    h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
    .upload-area { border: 3px dashed #667eea; border-radius: 10px; padding: 30px; cursor: pointer; margin-bottom: 20px; background: #f8f9ff; }
    .upload-icon { font-size: 40px; margin-bottom: 10px; }
    input[type="file"] { display: none; }
    .preview { width: 100%; max-height: 250px; border-radius: 10px; margin-bottom: 20px; display: none; object-fit: contain; border: 1px solid #ddd; }
    .preview.show { display: block; }
    button { width: 100%; padding: 15px; background: #764ba2; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #5a3682; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { display: none; margin: 20px 0; font-weight: bold; color: #667eea; }
    .result { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 14px; text-align: left; word-wrap: break-word; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📧 Enviar Currículo</h1>
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📸</div>
      <p>Clique para selecionar a imagem do anúncio</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <img id="preview" class="preview">
    <button id="sendBtn" disabled>Extrair Dados da Vaga</button>
    <div class="loading" id="loading">Analisando imagem com IA...</div>
    <div class="result" id="result"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXfW2WIl0S-KNUPi2OsLpaIs01bW0iVbmPoLT9C1BGW3uhaEWaAjbQqRsQdi1b6qvkFg/exec';
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const sendBtn = document.getElementById('sendBtn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    let selectedImage = null;

    uploadArea.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const max = 450;
          let w = img.width, h = img.height;
          if (w > h) { if (w > max) { h *= max / w; w = max; } }
          else { if (h > max) { w *= max / h; h = max; } }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          selectedImage = canvas.toDataURL('image/jpeg', 0.5);
          preview.src = selectedImage;
          preview.classList.add('show');
          sendBtn.disabled = false;
          result.style.display = 'none';
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    };

    sendBtn.onclick = async () => {
      loading.style.display = 'block';
      sendBtn.disabled = true;
      result.style.display = 'none';
      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors', // Importante para evitar erros de CORS em alguns navegadores
          body: JSON.stringify({ imagem: selectedImage.split(',')[1] })
        });
        
        // Como o modo 'no-cors' não permite ler a resposta, fazemos um fetch normal primeiro
        const realResponse = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ imagem: selectedImage.split(',')[1] })
        });
        
        const data = await realResponse.json();
        if (data.sucesso) {
          result.className = 'result success';
          result.innerHTML = `<strong>Vaga:</strong> ${data.vaga}<br><strong>E-mail:</strong> ${data.email}`;
        } else {
          result.className = 'result error';
          result.innerText = '❌ Erro: ' + (data.erro || 'Não foi possível extrair os dados.');
        }
      } catch (e) {
        result.className = 'result error';
        result.innerText = '✅ Verifique o console ou tente novamente. Se o e-mail não apareceu, o Gemini pode ter bloqueado a imagem.';
        console.error(e);
      }
      loading.style.display = 'none';
      sendBtn.disabled = false;
      result.style.display = 'block';
    };
  </script>
</body>
</html>
