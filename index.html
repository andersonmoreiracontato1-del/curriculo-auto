<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar Currículo Automático</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); padding: 40px; max-width: 500px; width: 100%; }
    h1 { color: #333; margin-bottom: 10px; font-size: 28px; text-align: center; }
    .subtitle { color: #666; text-align: center; margin-bottom: 30px; font-size: 14px; }
    .upload-area { border: 3px dashed #667eea; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s ease; margin-bottom: 20px; background: #f8f9ff; }
    .upload-area:hover { border-color: #764ba2; background: #f0f2ff; }
    .upload-icon { font-size: 48px; margin-bottom: 15px; }
    input[type="file"] { display: none; }
    .preview { width: 100%; max-height: 300px; border-radius: 10px; margin-bottom: 20px; display: none; object-fit: cover; }
    .preview.show { display: block; }
    button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .loading { display: none; text-align: center; margin: 20px 0; }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .result { display: none; margin-top: 20px; padding: 20px; border-radius: 10px; font-size: 14px; word-break: break-word; white-space: pre-wrap; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📧 Enviar Currículo</h1>
    <p class="subtitle">Faça upload da imagem do anúncio</p>
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📸</div>
      <div class="upload-text">Clique para selecionar</div>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <img id="preview" class="preview">
    <button id="sendBtn" disabled>Enviar Currículo</button>
    <div class="loading" id="loading"><div class="spinner"></div></div>
    <div class="result" id="result"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz38ohG3ydZmCHbUCKBMtYe4qJbOgWHCyZItNdl9jFrMJTBJitGMtXHj1Z2SQeNssYo0A/exec';
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const sendBtn = document.getElementById('sendBtn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    let selectedImage = null;

    uploadArea.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const max = 400;
          let w = img.width, h = img.height;
          if (w > h) { if (w > max) { h *= max / w; w = max; } }
          else { if (h > max) { w *= max / h; h = max; } }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          selectedImage = canvas.toDataURL('image/jpeg', 0.4);
          preview.src = selectedImage;
          preview.classList.add('show');
          sendBtn.disabled = false;
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    };

    sendBtn.onclick = async () => {
      loading.style.display = 'block';
      sendBtn.disabled = true;
      result.style.display = 'none';
      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ imagem: selectedImage.split(',')[1] })
        });
        const data = await response.json();
        if (data.sucesso) {
          result.className = 'result success';
          result.innerText = `✅ Vaga: ${data.vaga}\n📧 Email: ${data.email}`;
        } else {
          result.className = 'result error';
          result.innerText = '❌ Erro: ' + data.erro;
        }
      } catch (e) {
        result.className = 'result error';
        result.innerText = '❌ Erro de conexão';
      }
      loading.style.display = 'none';
      sendBtn.disabled = false;
      result.style.display = 'block';
    };
  </script>
</body>
</html>
