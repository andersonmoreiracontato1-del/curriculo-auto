<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar Currículo Automático</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    h2 { color: #333; margin-bottom: 20px; font-size: 22px; }
    .upload-box { border: 2px dashed #667eea; padding: 30px; cursor: pointer; margin-bottom: 20px; border-radius: 10px; background: #f8f9ff; transition: 0.3s; }
    .upload-box:hover { background: #f0f2ff; }
    #p { width: 100%; display: none; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ddd; }
    button { width: 100%; padding: 15px; background: #764ba2; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { display: none; margin: 15px 0; color: #667eea; font-weight: bold; }
    .res { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; text-align: left; font-size: 14px; line-height: 1.5; }
    .err { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📧 Analisar Vaga</h2>
    <div class="upload-box" onclick="document.getElementById('f').click()">
      <div style="font-size: 40px; margin-bottom: 10px;">📸</div>
      <p>Clique para selecionar a imagem</p>
      <input type="file" id="f" accept="image/*" style="display:none">
    </div>
    <img id="p">
    <button id="b" disabled>Extrair Dados da Vaga</button>
    <div id="loader" class="loading">IA processando imagem...</div>
    <div id="r" class="res"></div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw9FaK6BN4LWhmgh8MhEXbsMB_LNjLJpcCXQ1GcALz7-l1qcwx07F550VSK6Mgfczv9bQ/exec';
    let base64Image = null;

    document.getElementById('f').onchange = (e) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_SIZE = 450; // Redimensiona para evitar erro de limite de dados
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
          } else {
            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          // Qualidade 0.4 para garantir que fique abaixo dos 20KB
          base64Image = canvas.toDataURL('image/jpeg', 0.4).split(',')[1];
          const preview = document.getElementById('p');
          preview.src = canvas.toDataURL('image/jpeg');
          preview.style.display = 'block';
          document.getElementById('b').disabled = false;
          document.getElementById('r').style.display = 'none';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('b').onclick = async () => {
      const btn = document.getElementById('b');
      const loader = document.getElementById('loader');
      const resDiv = document.getElementById('r');
      
      btn.disabled = true;
      loader.style.display = 'block';
      resDiv.style.display = 'none';

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ imagem: base64Image })
        });
        
        const data = await response.json();
        resDiv.style.display = 'block';
        
        if (data.sucesso) {
          resDiv.className = 'res ok';
          resDiv.innerHTML = `<strong>Vaga:</strong> ${data.vaga}<br><strong>E-mail:</strong> ${data.email}`;
        } else {
          resDiv.className = 'res err';
          resDiv.innerText = '❌ ' + (data.erro || 'Erro ao extrair dados.');
        }
      } catch (err) {
        resDiv.style.display = 'block';
        resDiv.className = 'res err';
        resDiv.innerText = '❌ Erro de conexão. Verifique se o Script está como "Qualquer pessoa".';
      } finally {
        loader.style.display = 'none';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
