<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Anderson Moreira</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
    .card { background: #111; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
    h2 { color: #bb86fc; margin: 0 0 10px 0; }
    p { color: #888; font-size: 14px; margin-bottom: 25px; }
    .btn-main { background: #03dac6; color: #000; padding: 20px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; width: 100%; transition: 0.2s; }
    .btn-main:active { transform: scale(0.95); opacity: 0.8; }
    #preview { width: 100%; border-radius: 10px; display: none; margin-top: 20px; border: 1px solid #444; }
    .status { margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 10px; display: none; font-size: 14px; }
    .loading { background: #1a1a1a; color: #bb86fc; border: 1px solid #bb86fc; }
    .success { background: #1b5e20; color: #fff; border: 1px solid #2e7d32; }
    .error { background: #b71c1c; color: #fff; border: 1px solid #d32f2f; }
  </style>
</head>
<body>

<div class="card">
  <h2>🚀 Auto-Envio V3</h2>
  <p>Híbrido: IA + OCR (Sistema Blindado)</p>

  <button class="btn-main" onclick="document.getElementById('fileInput').click()">📁 SELECIONAR PRINT OU FOTO</button>
  <input type="file" id="fileInput" accept="image/*" hidden>

  <img id="preview">
  <div id="statusBox" class="status"></div>
</div>

<script>
  // SEU LINK NOVO ATUALIZADO
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuPfS9PKLLMPc6IE7FktJ2VONqwR39ETejWmoc8WH97NpsrYERorubmqi_0_YTCNoysw/exec";

  const fileInput = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const statusBox = document.getElementById('statusBox');

  fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (ev) => {
      preview.src = ev.target.result;
      preview.style.display = "block";
      showStatus("⏳ Processando e Enviando...<br>(IA + OCR Ativos)", "loading");
    };
    reader.readAsDataURL(file);

    const img = new Image();
    img.src = URL.createObjectURL(file);
    img.onload = async () => {
      const canvas = document.createElement('canvas');
      const MAX_WIDTH = 900; 
      const scaleSize = MAX_WIDTH / img.width;
      canvas.width = MAX_WIDTH;
      canvas.height = img.height * scaleSize;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      
      const base64Data = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ imagem: base64Data })
        });
        const result = await response.json();

        if (result.sucesso) {
          showStatus(`✅ ENVIADO!<br><b>Email:</b> ${result.email}<br><small>${result.aviso}</small>`, "success");
        } else {
          showStatus("❌ FALHA: " + result.erro, "error");
        }
      } catch (err) {
        showStatus("❌ ERRO DE CONEXÃO", "error");
      }
    };
  };

  function showStatus(text, type) {
    statusBox.innerHTML = text;
    statusBox.className = "status " + type;
    statusBox.style.display = "block";
  }
</script>

</body>
</html>
